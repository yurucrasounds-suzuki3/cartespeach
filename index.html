<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>美容室カルテ</title>
</head>
<body>
  <h2>美容室カルテ</h2>

  <input id="customerName" placeholder="顧客名"><br><br>

  <button onclick="start()">録音</button>
  <p id="status"></p>

  <textarea id="text" style="width:100%;height:100px;"></textarea><br>

  <button onclick="send()">保存</button>

<script>
const API_URL = "ここにAppsScriptの/exec URL";

let recognition;

function start() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("このブラウザは音声認識に対応していません。Chromeで開いてください。");
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = "ja-JP";

  recognition.onresult = (e) => {
    document.getElementById("text").value = e.results[0][0].transcript;
  };

  recognition.onerror = (e) => {
    console.error(e);
    document.getElementById("status").innerText = "音声認識エラー: " + e.error;
  };

  recognition.start();
  document.getElementById("status").innerText = "録音中...";
}

async function send() {
  const params = new URLSearchParams();
  params.append("customerName", document.getElementById("customerName").value);
  params.append("transcript", document.getElementById("text").value);
  params.append("menu", "");
  params.append("color", "");
  params.append("length", "");
  params.append("concerns", "");
  params.append("caution", "");
  params.append("next", "");
  params.append("memo", "");

  try {
    await fetch(API_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: params.toString()
    });

    alert("送信しました");
  } catch (e) {
    console.error(e);
    alert("送信に失敗しました");
  }
}
</script>
</body>
</html>
