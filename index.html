<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>美容室カルテ</title>
</head>
<body>
  <h2>美容室カルテ</h2>

  <input id="customerName" placeholder="顧客名"><br><br>

  <button onclick="start()">録音</button>
  <p id="status"></p>

  <textarea id="text" style="width:100%;height:100px;"></textarea><br>

  <button onclick="send()">保存</button>

<script>
const API_URL = "ここにAppsScriptのURL";

let recognition;

function start(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  recognition = new SpeechRecognition();
  recognition.lang = "ja-JP";

  recognition.onresult = (e)=>{
    document.getElementById("text").value = e.results[0][0].transcript;
  };

  recognition.start();
  document.getElementById("status").innerText = "録音中...";
}

async function send(){
  const data = {
    customerName: document.getElementById("customerName").value,
    transcript: document.getElementById("text").value,
    menu: "",
    color: "",
    length: "",
    concerns: "",
    caution: "",
    next: "",
    memo: ""
  };

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  alert("保存した");
}
</script>
</body>
</html>
